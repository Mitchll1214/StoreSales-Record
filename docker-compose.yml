version: '3.8'

services:
  # ===== 应用服务（默认使用 SQLite，零依赖）=====
  app:
    build: .
    container_name: store_sales_app
    restart: always
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string}
      PORT: ${PORT:-3000}
    volumes:
      - sqlite_data:/app/data

  # ===== 可选：MySQL 服务（如需使用 MySQL 请取消下方注释）=====
  # 取消注释后，在 .env 中设置 DB_HOST=mysql 及 DB_USER/DB_PASSWORD 即可
  # mysql:
  #   image: mysql:8.0
  #   container_name: store_sales_db
  #   restart: always
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root123}
  #     MYSQL_DATABASE: ${DB_NAME:-store_sales}
  #     MYSQL_CHARSET: utf8mb4
  #     MYSQL_COLLATION: utf8mb4_unicode_ci
  #   ports:
  #     - "${DB_PORT:-3306}:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #     - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  sqlite_data:
  # mysql_data:  # 使用 MySQL 时取消注释
