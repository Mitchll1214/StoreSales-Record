
services:
  # ===== 应用服务 =====
  # 默认使用 SQLite（零依赖），设置 DB_HOST 环境变量即可切换外部 MySQL
  app:
    build: .
    image: store-sales-record:latest
    container_name: store-sales-record
    restart: always
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      JWT_SECRET: ${JWT_SECRET:-change-me-to-a-random-string}
      PORT: ${PORT:-3000}
      # 数据库配置（不设置则默认 SQLite）
      DB_DIALECT: ${DB_DIALECT:-}
      DB_HOST: ${DB_HOST:-}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-store_sales}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-}
    volumes:
      - sqlite_data:/app/data

volumes:
  sqlite_data:
